name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: ct-linux-x86_64
            artifact_path: ct
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: ct-macos-aarch64
            artifact_path: ct
          - runner: macos-14
            target: x86_64-apple-darwin
            artifact_name: ct-macos-x86_64
            artifact_path: ct
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ct-windows-x86_64
            artifact_path: ct.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_path }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename and prepare release assets
        run: |
          mkdir -p release
          mv artifacts/ct-linux-x86_64/ct release/ct-linux-x86_64
          mv artifacts/ct-macos-aarch64/ct release/ct-macos-aarch64
          mv artifacts/ct-macos-x86_64/ct release/ct-macos-x86_64
          mv artifacts/ct-windows-x86_64/ct.exe release/ct-windows-x86_64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/ct-linux-x86_64
            release/ct-macos-aarch64
            release/ct-macos-x86_64
            release/ct-windows-x86_64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
